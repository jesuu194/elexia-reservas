<section class="detail-page">
	<div *ngIf="loading()" class="text-center my-4">
		<div class="spinner-border" role="status"><span class="visually-hidden">Cargando...</span></div>
	</div>
	<div *ngIf="error()" class="alert alert-danger">{{ error() }}</div>

	<article *ngIf="product()" class="detail-card">
		<header class="detail-card__header">
			<div>
				<p class="mb-1 text-secondary">Detalle de producto</p>
				<h3 class="mb-0">{{ product()?.nombre }}</h3>
			</div>
			<span class="status">{{ (product()?.disponible ?? true) ? 'Disponible' : 'No disponible' }}</span>
		</header>

		<p class="detail-card__description">{{ product()?.descripcion }}</p>

		<div class="detail-grid">
			<article>
				<span>Precio</span>
				<strong>{{ product()?.precio | currency:'USD' }}</strong>
			</article>
			<article>
				<span>Stock</span>
				<strong>{{ product()?.stock }}</strong>
			</article>
			<article>
				<span>ID</span>
				<strong class="id">{{ product()?._id }}</strong>
			</article>
		</div>

		<div class="actions mt-3">
			<a class="btn btn-secondary" routerLink="/productos">Volver</a>
			<a class="btn btn-warning" [routerLink]="['/productos', product()?._id, 'editar']">Editar</a>
		</div>
	</article>
</section>
