<section class="detail-page">
	<div *ngIf="loading()" class="text-center my-4">
		<div class="spinner-border" role="status"><span class="visually-hidden">Cargando...</span></div>
	</div>
	<div *ngIf="error()" class="alert alert-danger">{{ error() }}</div>

	<article *ngIf="reserva()" class="detail-card">
		<header class="detail-card__header">
			<div>
				<p class="mb-1 text-secondary">Detalle de reserva</p>
				<h3 class="mb-0">Reserva de {{ reserva()?.cliente }}</h3>
			</div>
			<span class="status"
				[ngClass]="reserva()?.estado === 'confirmada' ? 'status--ok' : (reserva()?.estado === 'cancelada' ? 'status--off' : 'status--pending')">
				{{ reserva()?.estado }}
			</span>
		</header>

		<div class="detail-grid">
			<article>
				<span>Producto</span>
				<strong>{{ productLabel(reserva()?.producto || '') }}</strong>
			</article>
			<article>
				<span>Fecha</span>
				<strong>{{ reserva()?.fecha | date:'shortDate' }}</strong>
			</article>
			<article>
				<span>Cantidad</span>
				<strong>{{ reserva()?.cantidad }}</strong>
			</article>
			<article>
				<span>ID</span>
				<strong class="id">{{ reserva()?._id }}</strong>
			</article>
		</div>

		<div class="actions mt-3">
			<a class="btn btn-secondary" routerLink="/reservas">Volver</a>
			<a class="btn btn-warning" [routerLink]="['/reservas', reserva()?._id, 'editar']">Editar</a>
		</div>
	</article>
</section>
