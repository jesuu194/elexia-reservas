<button class="chatbot-fab" type="button" (click)="toggle()" [attr.aria-expanded]="isOpen()" aria-label="Abrir chat de demo">
  <span *ngIf="!isOpen()">Chat demo</span>
  <span *ngIf="isOpen()">Cerrar</span>
</button>

<section class="chatbot-panel" *ngIf="isOpen()">
  <header class="chatbot-header">
    <div>
      <p class="chatbot-title">Elexia Bot</p>
      <p class="chatbot-status">{{ headerStatus() }}</p>
    </div>
  </header>

  <div class="chatbot-messages">
    <article *ngFor="let message of messages()" class="chatbot-message" [class.chatbot-message--user]="message.role === 'user'">
      <p>{{ message.text }}</p>
    </article>
  </div>

  <div class="chatbot-quick-replies">
    <button type="button" class="btn btn-sm btn-outline-secondary" *ngFor="let item of quickReplies" (click)="sendQuickReply(item)">
      {{ item }}
    </button>
  </div>

  <form class="chatbot-form" (ngSubmit)="sendInputMessage()">
    <input
      class="form-control"
      type="text"
      [ngModel]="input()"
      (ngModelChange)="input.set($event)"
      name="chatInput"
      placeholder="Escribe tu pregunta"
    />
    <button class="btn btn-primary" type="submit">Enviar</button>
  </form>
</section>
